<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Battle | GitHub Wrapped</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Orbitron:wght@400;700;800&family=JetBrains+Mono:wght@400;700&display=swap');
    </style>
    <style>
        :root {
            --bg-primary: #05070a;
            --bg-secondary: #0d1117;
            --bg-tertiary: #161b22;
            --accent: #00d2ff;
            --accent-glow: rgba(0, 210, 255, 0.3);
            --secondary: #3fb950;
            --danger: #f85149;
            
            --text-primary: #f0f6fc;
            --text-secondary: #8b949e;
            --text-muted: #484f58;
            
            --border: rgba(240, 246, 252, 0.1);
            --font-display: 'Orbitron', sans-serif;
            --font-sans: 'Inter', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            
            --transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: var(--font-sans);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* SVG Grain Texture Overlay */
        .noise-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 9999;
            pointer-events: none;
            opacity: 0.05;
        }

        /* Header */
        header {
            padding: 2rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            position: relative;
            z-index: 10;
        }

        .logo {
            font-family: var(--font-display);
            font-weight: 800;
            font-size: 1.2rem;
        }

        .logo span { color: var(--accent); }

        .back-link {
            font-family: var(--font-display);
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-decoration: none;
            transition: var(--transition);
        }

        .back-link:hover { color: var(--text-primary); }

        /* Battle Layout */
        .battle-container {
            display: flex;
            min-height: calc(100vh - 80px);
            position: relative;
        }

        .side {
            flex: 1;
            padding: 4rem 5%;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: var(--transition);
        }

        .side-left {
            background: linear-gradient(to right, rgba(0, 210, 255, 0.03), transparent);
            transform: translateX(-100%);
        }

        .side-right {
            background: linear-gradient(to left, rgba(63, 185, 80, 0.03), transparent);
            transform: translateX(100%);
        }

        .side.show { transform: translateX(0); }

        /* VS Badge */
        .vs-divider {
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 2px;
            background: var(--border);
            transform: translateX(-50%);
            z-index: 5;
        }

        .vs-badge {
            position: absolute;
            left: 50%;
            top: 20%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            background: var(--bg-primary);
            border: 2px solid var(--border);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: var(--font-display);
            font-weight: 800;
            font-size: 1.5rem;
            z-index: 10;
        }

        .electric-arc {
            position: absolute;
            top: -10px;
            left: -10px;
            right: -10px;
            bottom: -10px;
            pointer-events: none;
        }

        .arc-svg {
            width: 100%;
            height: 100%;
            overflow: visible;
        }

        .arc-path {
            fill: none;
            stroke: var(--accent);
            stroke-width: 2;
            stroke-dasharray: 10, 5;
            animation: arcMove 0.5s linear infinite, pulse 2s ease infinite;
        }

        @keyframes arcMove {
            to { stroke-dashoffset: -15; }
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; filter: blur(0); }
            50% { opacity: 1; filter: blur(2px); stroke: var(--secondary); }
        }

        /* User Header */
        .user-header {
            text-align: center;
            margin-bottom: 4rem;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin-bottom: 1.5rem;
            border: 3px solid var(--border);
            transition: var(--transition);
        }

        .avatar:hover { transform: scale(1.1); border-color: var(--accent); }

        .username {
            font-family: var(--font-display);
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .score {
            font-family: var(--font-display);
            font-size: 3rem;
            color: var(--accent);
        }

        /* Comparison Rows */
        .comp-rows {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .comp-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem;
            background: var(--bg-secondary);
            border-radius: 12px;
            border: 1px solid var(--border);
            position: relative;
            transition: var(--transition);
        }

        .comp-row:hover { border-color: rgba(255,255,255,0.2); transform: scale(1.02); }

        .row-label {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            font-family: var(--font-display);
            font-size: 0.6rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            white-space: nowrap;
        }

        .row-val {
            font-family: var(--font-mono);
            font-weight: 700;
            font-size: 1.2rem;
        }

        .winner { color: var(--secondary); text-shadow: 0 0 10px var(--secondary-glow); }

        /* Winner Banner */
        .winner-announcement {
            position: fixed;
            bottom: 4rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--secondary);
            color: var(--bg-primary);
            padding: 1rem 3rem;
            border-radius: 999px;
            font-family: var(--font-display);
            font-weight: 800;
            text-transform: uppercase;
            box-shadow: 0 0 30px var(--secondary-glow);
            z-index: 100;
            opacity: 0;
            transition: all 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .winner-announcement.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        @media (max-width: 900px) {
            .battle-container { flex-direction: column; }
            .vs-divider { display: none; }
            .vs-badge { top: 50%; }
            .side-left, .side-right { transform: translateY(50px); opacity: 0; }
            .side.show { transform: translateY(0); opacity: 1; }
            .row-label { position: static; transform: none; margin-bottom: 0.5rem; }
            .comp-row { flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>

    <svg class="noise-overlay" xmlns="http://www.w3.org/2000/svg">
        <filter id="noiseFilter">
            <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
        </filter>
        <rect width="100%" height="100%" filter="url(#noiseFilter)"/>
    </svg>

    <header>
        <div class="logo">GITHUB <span>WRAPPED</span></div>
        <a href="index.html" class="back-link">ESC TO HOME</a>
    </header>

    <div class="battle-container">
        <div class="vs-divider"></div>
        <div class="vs-badge">
            VS
            <div class="electric-arc">
                <svg class="arc-svg" viewBox="0 0 100 100">
                    <circle class="arc-path" cx="50" cy="50" r="45"></circle>
                </svg>
            </div>
        </div>

        <!-- Left Side: torvalds -->
        <div class="side side-left" id="side-1">
            <div class="user-header">
                <img src="https://github.com/torvalds.png" class="avatar" alt="torvalds">
                <div class="username">@torvalds</div>
                <div class="score" id="score-1">0</div>
            </div>

            <div class="comp-rows">
                <div class="comp-row">
                    <div class="row-val" id="commits-1">0</div>
                    <div class="row-label">COMMITS</div>
                    <div class="row-val">---</div>
                </div>
                <div class="comp-row">
                    <div class="row-val" id="prs-1">0</div>
                    <div class="row-label">PULL REQUESTS</div>
                    <div class="row-val">---</div>
                </div>
                <div class="comp-row">
                    <div class="row-val" id="stars-1">0</div>
                    <div class="row-label">STARS</div>
                    <div class="row-val">---</div>
                </div>
            </div>
        </div>

        <!-- Right Side: gaearon -->
        <div class="side side-right" id="side-2">
            <div class="user-header">
                <img src="https://github.com/gaearon.png" class="avatar" alt="gaearon">
                <div class="username">@gaearon</div>
                <div class="score" id="score-2">0</div>
            </div>

            <div class="comp-rows">
                <div class="comp-row">
                    <div class="row-val">---</div>
                    <div class="row-label">COMMITS</div>
                    <div class="row-val" id="commits-2">0</div>
                </div>
                <div class="comp-row">
                    <div class="row-val">---</div>
                    <div class="row-label">PULL REQUESTS</div>
                    <div class="row-val" id="prs-2">0</div>
                </div>
                <div class="comp-row">
                    <div class="row-val">---</div>
                    <div class="row-label">STARS</div>
                    <div class="row-val" id="stars-2">0</div>
                </div>
            </div>
        </div>
    </div>

    <div class="winner-announcement" id="winner-banner">
        LINUS TORVALDS WINS THE BATTLE
    </div>

    <script>
        const user1 = {
            commits: 3452,
            prs: 412,
            stars: 12503,
            totalScore: 88
        };

        const user2 = {
            commits: 1205,
            prs: 843,
            stars: 45201,
            totalScore: 72
        };

        window.onload = () => {
            // Show sides
            setTimeout(() => {
                document.getElementById('side-1').classList.add('show');
                document.getElementById('side-2').classList.add('show');
                startBattle();
            }, 500);
        };

        function startBattle() {
            // Animate values
            countTo('commits-1', user1.commits);
            countTo('commits-2', user2.commits);
            countTo('prs-1', user1.prs);
            countTo('prs-2', user2.prs);
            countTo('stars-1', user1.stars);
            countTo('stars-2', user2.stars);

            // Animate scores
            setTimeout(() => {
                countTo('score-1', user1.totalScore);
                countTo('score-2', user2.totalScore);
                
                // Final announcement
                setTimeout(() => {
                    document.getElementById('winner-banner').classList.add('show');
                    // Add winner styles
                    document.getElementById('score-1').classList.add('winner');
                }, 2000);
            }, 1000);
        }

        function countTo(id, target) {
            let current = 0;
            const step = () => {
                current += Math.ceil(target / 50);
                if (current > target) current = target;
                const el = document.getElementById(id);
                if (el) el.innerText = current.toLocaleString();
                if (current < target) requestAnimationFrame(step);
            };
            step();
        }
    </script>
</body>
</html>
