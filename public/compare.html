<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Battle | GitHub Wrapped</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root{--bg-void:#020408;--bg-primary:#05070a;--bg-secondary:#0a0e17;--bg-card:rgba(10,14,23,0.6);--accent:#00d2ff;--accent-glow:rgba(0,210,255,0.25);--green:#3fb950;--green-glow:rgba(63,185,80,0.25);--orange:#f0883e;--danger:#f85149;--text-primary:#e6edf3;--text-secondary:#7d8590;--text-muted:#484f58;--border:rgba(240,246,252,0.06);--font-display:'Orbitron',sans-serif;--font-body:'Inter',sans-serif;--font-mono:'JetBrains Mono',monospace;--ease-out-expo:cubic-bezier(0.16,1,0.3,1);--ease-spring:cubic-bezier(0.175,0.885,0.32,1.275)}
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        body{background:var(--bg-void);color:var(--text-primary);font-family:var(--font-body);overflow-x:hidden;min-height:100vh}
        ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bg-secondary);border-radius:10px}

        /* Header */
        header{padding:1.2rem 5%;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);backdrop-filter:blur(20px);background:rgba(2,4,8,0.7);position:sticky;top:0;z-index:100}
        .logo{font-family:var(--font-display);font-weight:900;font-size:1.1rem;letter-spacing:2px}
        .logo span{color:var(--accent);text-shadow:0 0 30px var(--accent-glow)}
        .back-link{font-family:var(--font-display);font-size:0.65rem;letter-spacing:2px;color:var(--text-secondary);text-decoration:none;padding:0.5rem 1rem;border:1px solid var(--border);border-radius:8px;transition:all 0.3s ease}
        .back-link:hover{border-color:var(--accent);color:var(--accent)}

        /* Input section */
        .input-section{max-width:700px;margin:3rem auto;padding:0 5%;text-align:center;opacity:0;animation:fadeUp 0.6s var(--ease-out-expo) 0.2s forwards}
        @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
        .input-title{font-family:var(--font-display);font-size:1.5rem;letter-spacing:3px;margin-bottom:0.5rem}
        .input-sub{color:var(--text-secondary);margin-bottom:2rem;font-size:0.9rem}
        .input-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap;justify-content:center}
        .compare-input{flex:1;min-width:180px;padding:1rem 1.2rem;background:var(--bg-secondary);border:1px solid var(--border);border-radius:12px;color:var(--text-primary);font-size:1rem;font-family:var(--font-body);outline:none;transition:border-color 0.3s}
        .compare-input:focus{border-color:var(--accent)}
        .vs-text{font-family:var(--font-display);font-weight:900;font-size:1.2rem;color:var(--text-muted)}
        .battle-btn{margin-top:1.5rem;padding:1rem 3rem;border:none;border-radius:12px;background:linear-gradient(135deg,var(--accent),#00a5cc);color:var(--bg-void);font-family:var(--font-display);font-weight:700;font-size:0.8rem;letter-spacing:2px;cursor:pointer;transition:all 0.3s}
        .battle-btn:hover{transform:scale(1.05);box-shadow:0 0 30px var(--accent-glow)}
        .battle-btn.loading{opacity:0.6;pointer-events:none}
        .compare-error{color:var(--danger);font-size:0.8rem;margin-top:1rem;min-height:1.2em}

        /* Battle results */
        #battle-results{display:none;max-width:1000px;margin:0 auto;padding:2rem 5% 4rem}

        /* Battle header */
        .battle-header{display:flex;justify-content:space-around;align-items:center;margin-bottom:3rem;position:relative}
        .fighter{text-align:center;opacity:0;transition:all 0.8s var(--ease-out-expo)}
        .fighter.left{transform:translateX(-60px)}
        .fighter.right{transform:translateX(60px)}
        .fighter.show{opacity:1;transform:translateX(0)}
        .fighter-avatar{width:100px;height:100px;border-radius:50%;object-fit:cover;border:3px solid var(--border);margin-bottom:1rem;transition:all 0.3s}
        .fighter.winner .fighter-avatar{border-color:var(--green);box-shadow:0 0 25px var(--green-glow)}
        .fighter-name{font-family:var(--font-display);font-size:0.9rem;letter-spacing:2px;margin-bottom:0.5rem}
        .fighter-badge{font-size:0.7rem;color:var(--text-secondary)}
        .fighter-score{font-family:var(--font-display);font-size:2.5rem;font-weight:900;color:var(--accent);margin-top:0.5rem}
        .fighter.winner .fighter-score{color:var(--green)}

        .vs-badge{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:70px;height:70px;background:var(--bg-void);border:2px solid var(--border);border-radius:50%;display:grid;place-items:center;font-family:var(--font-display);font-weight:900;font-size:1.2rem;z-index:5}
        .vs-badge::before{content:'';position:absolute;inset:-8px;border-radius:50%;border:1px dashed var(--accent);animation:spin 6s linear infinite;opacity:0.4}
        @keyframes spin{to{transform:rotate(360deg)}}

        /* Metric rows */
        .metrics{display:flex;flex-direction:column;gap:1rem}
        .metric-row{display:grid;grid-template-columns:1fr auto 1fr;gap:1.5rem;align-items:center;background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:1.5rem 2rem;backdrop-filter:blur(12px);opacity:0;transform:translateY(15px);transition:all 0.5s var(--ease-out-expo)}
        .metric-row.show{opacity:1;transform:translateY(0)}
        .metric-row:hover{border-color:rgba(255,255,255,0.1)}
        .metric-val{font-family:var(--font-mono);font-size:1.3rem;font-weight:700}
        .metric-val.left{text-align:right}
        .metric-val.right{text-align:left}
        .metric-val.win{color:var(--green);text-shadow:0 0 10px var(--green-glow)}
        .metric-label{font-family:var(--font-display);font-size:0.55rem;letter-spacing:3px;color:var(--text-muted);text-align:center;text-transform:uppercase;white-space:nowrap}

        /* Winner banner */
        .winner-banner{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(80px);padding:1rem 3rem;border-radius:999px;font-family:var(--font-display);font-weight:800;font-size:0.8rem;letter-spacing:3px;z-index:200;opacity:0;transition:all 1s var(--ease-spring);background:linear-gradient(135deg,var(--green),#2ea043);color:var(--bg-void);box-shadow:0 0 40px var(--green-glow)}
        .winner-banner.show{transform:translateX(-50%) translateY(0);opacity:1}

        @media(max-width:768px){
            .battle-header{flex-direction:column;gap:1.5rem}
            .vs-badge{position:static;transform:none;margin:0.5rem 0}
            .fighter.left,.fighter.right{transform:translateY(30px)}
            .metric-row{grid-template-columns:1fr;text-align:center;gap:0.5rem}
            .metric-val.left,.metric-val.right{text-align:center}
            .input-row{flex-direction:column}
        }
    </style>
</head>
<body>

<header>
    <div class="logo">GITHUB <span>WRAPPED</span></div>
    <a href="index.html" class="back-link">← HOME</a>
</header>

<section class="input-section" id="input-section">
    <h1 class="input-title">⚔ GITHUB BATTLE</h1>
    <p class="input-sub">Pit two developers against each other. Who has the stronger GitHub game?</p>
    <div class="input-row">
        <input type="text" class="compare-input" id="user1" placeholder="Player 1 username" spellcheck="false" value="">
        <span class="vs-text">VS</span>
        <input type="text" class="compare-input" id="user2" placeholder="Player 2 username" spellcheck="false" value="">
    </div>
    <button class="battle-btn" id="battle-btn">⚡ START BATTLE</button>
    <div class="compare-error" id="compare-error"></div>
</section>

<section id="battle-results">
    <div class="battle-header">
        <div class="fighter left" id="f1">
            <img class="fighter-avatar" id="f1-avatar" src="" alt="">
            <div class="fighter-name" id="f1-name">@user1</div>
            <div class="fighter-badge" id="f1-badge"></div>
            <div class="fighter-score" id="f1-score">0</div>
        </div>
        <div class="vs-badge">VS</div>
        <div class="fighter right" id="f2">
            <img class="fighter-avatar" id="f2-avatar" src="" alt="">
            <div class="fighter-name" id="f2-name">@user2</div>
            <div class="fighter-badge" id="f2-badge"></div>
            <div class="fighter-score" id="f2-score">0</div>
        </div>
    </div>
    <div class="metrics" id="metrics"></div>
</section>

<div class="winner-banner" id="winner-banner"></div>

<script>
function countUp(el,target,dur=1000){
    const start=performance.now();
    function tick(now){
        const p=Math.min((now-start)/dur,1);
        const ease=1-Math.pow(1-p,3);
        el.textContent=Math.floor(target*ease).toLocaleString();
        if(p<1)requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
}

const btn=document.getElementById('battle-btn');
const errEl=document.getElementById('compare-error');

btn.addEventListener('click', async()=>{
    const u1=document.getElementById('user1').value.trim();
    const u2=document.getElementById('user2').value.trim();
    errEl.textContent='';
    if(!u1||!u2){errEl.textContent='Enter both usernames';return}
    if(u1===u2){errEl.textContent='Pick two different users';return}

    btn.classList.add('loading');btn.textContent='LOADING...';

    try{
        const [r1,r2]=await Promise.all([
            fetch(`/wrapped/${encodeURIComponent(u1)}`).then(r=>r.json()),
            fetch(`/wrapped/${encodeURIComponent(u2)}`).then(r=>r.json())
        ]);
        if(!r1.success)throw new Error(r1.error||`Failed for ${u1}`);
        if(!r2.success)throw new Error(r2.error||`Failed for ${u2}`);
        showBattle(r1.data, r2.data);
    }catch(e){
        errEl.textContent=e.message;
        btn.classList.remove('loading');btn.textContent='⚡ START BATTLE';
    }
});

function showBattle(d1,d2){
    document.getElementById('input-section').style.display='none';
    document.getElementById('battle-results').style.display='block';

    // Populate fighters
    document.getElementById('f1-avatar').src=d1.avatarUrl;
    document.getElementById('f1-name').textContent=`@${d1.username}`;
    document.getElementById('f1-badge').textContent=d1.personalityBadge;
    document.getElementById('f2-avatar').src=d2.avatarUrl;
    document.getElementById('f2-name').textContent=`@${d2.username}`;
    document.getElementById('f2-badge').textContent=d2.personalityBadge;

    // Slide in fighters
    setTimeout(()=>document.getElementById('f1').classList.add('show'),200);
    setTimeout(()=>document.getElementById('f2').classList.add('show'),400);

    // Metrics
    const metrics=[
        {label:'COMMITS',v1:d1.totalCommits,v2:d2.totalCommits},
        {label:'PULL REQUESTS',v1:d1.totalPRs,v2:d2.totalPRs},
        {label:'STARS',v1:d1.totalStars,v2:d2.totalStars},
        {label:'LONGEST STREAK',v1:d1.longestStreak,v2:d2.longestStreak},
        {label:'PUBLIC REPOS',v1:d1.publicRepos,v2:d2.publicRepos},
        {label:'ISSUES',v1:d1.totalIssues||0,v2:d2.totalIssues||0}
    ];

    const container=document.getElementById('metrics');
    container.innerHTML='';
    let score1=0,score2=0;

    metrics.forEach((m,i)=>{
        const w1=m.v1>m.v2, w2=m.v2>m.v1;
        if(w1)score1++; if(w2)score2++;
        const row=document.createElement('div');
        row.className='metric-row';
        row.innerHTML=`<div class="metric-val left${w1?' win':''}" id="mv1-${i}">${m.v1.toLocaleString()}</div><div class="metric-label">${m.label}</div><div class="metric-val right${w2?' win':''}" id="mv2-${i}">${m.v2.toLocaleString()}</div>`;
        container.appendChild(row);
        setTimeout(()=>row.classList.add('show'), 800 + i*200);
    });

    // Scores
    const totalDelay = 800 + metrics.length*200 + 500;
    setTimeout(()=>{
        countUp(document.getElementById('f1-score'),score1,800);
        countUp(document.getElementById('f2-score'),score2,800);
    }, totalDelay);

    // Winner
    setTimeout(()=>{
        const winner = score1>score2?d1.username:score2>score1?d2.username:null;
        const banner=document.getElementById('winner-banner');
        if(winner){
            banner.textContent=`🏆 @${winner.toUpperCase()} WINS THE BATTLE`;
            if(score1>score2)document.getElementById('f1').classList.add('winner');
            else document.getElementById('f2').classList.add('winner');
        }else{
            banner.textContent="⚡ IT'S A TIE!";
            banner.style.background='linear-gradient(135deg,var(--accent),var(--orange))';
        }
        banner.classList.add('show');
    }, totalDelay+1000);
}

// Pre-fill from URL params
const params=new URLSearchParams(location.search);
if(params.get('u1'))document.getElementById('user1').value=params.get('u1');
if(params.get('u2'))document.getElementById('user2').value=params.get('u2');
</script>
</body>
</html>
